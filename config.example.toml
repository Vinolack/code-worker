# Server settings
server_name = "xaio-code-worker"
listen_host = "0.0.0.0"
listen_port = 8084
log_level = "INFO"       # Logging level for uvicorn (e.g., DEBUG, INFO, WARNING, ERROR, CRITICAL)
access_log = true        # Enable/disable server access logging
workers = 1              # Number of workers
frontend_index_url = "http://localhost:5173/" # URL for the frontend application
backend_url = "http://10.85.3.168:8099/"

allow_origins = [
    "*"
]

# Auth settings
auth_whitelist_urls = [
    "/docs",
    "/redoc",
    "/openapi",
    "/status/ping"
]

# admin path
admin_urls = [
    "/api/admin",
]

# 开放给外部调用的vlm代理调用接口路由
vlm_proxy_urls = [
    "/v1/chat/completions",
    "/v1/completions",
    "/v1/embeddings",
    "/rerank",
    "/v1/rerank",
    "/v2/rerank",
    "/v1/models",
    "/v1/models/*",
    "/v1/audio/transcriptions",
    "/audio/v1/tts"
]

[internal_service]
# 内部服务鉴权秘钥
secret_key = "f57843e4178c103013b2d5ab7059e41f"

# Database settings
[mysql]
host = "10.85.3.196"
port = 3306
user = "ys-vxai"
password = "ys-vxai123"
database = "ys-vxai"
pool_size = 20
sql_echo = true         # Log SQL queries generated by SQLAlchemy

[redis]
host = "10.85.3.196"
port = 6379
password = ""           # Leave empty if no password
db = 2
max_connections = 1000

[limiter]
# limiter mode / 限流模式: off=disabled, observe=observe only, enforce=hard block
mode = "enforce"
# redis failure policy / Redis 故障策略: fail-open=allow request, fail-closed=reject request
fail_policy = "fail-open"
# lease TTL in milliseconds / 并发租约TTL（毫秒）
lease_ttl_ms = 900000
# max concurrent requests per subject / 每个主体总并发上限
user_total_concurrency_limit = 20
# max concurrent requests per subject+model / 每个主体+模型并发上限
user_model_concurrency_limit = 5
# false=use api_key_digest (default now), true=use user_id / false按api_key_digest（当前默认口径），true按user_id
subject_use_user_id = false
# dynamic per-user limits from external config / 是否启用外部动态限额
enable_dynamic_limits = false
# rollout percentage (0-100) / 灰度百分比（0-100）
rollout_percent = 100

[limiter.redis]
# limiter Redis can be independent from business Redis / limiter Redis可与业务Redis独立部署
host = "10.85.3.196"
port = 6379
password = ""
db = 2
# namespace prefix for shared Redis / 共享Redis必须治理命名空间前缀，避免键冲突
prefix = "xaio:limiter"
# environment segment in key namespace / 键命名空间中的环境段（共享Redis建议必填）
env = "prod"
# service segment in key namespace / 键命名空间中的服务段（共享Redis建议必填）
service = "xaio-code-worker"

# Logging settings
[logging]
dir = "logs/" # Directory for log files, relative to the project root
console_log_level = "DEBUG" # Logging level for console output
format = "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level:<8} | {trace_msg} | {name}:{function}:{line} - {message}"
server_rotation = "00:00"   # Rotate server log daily at midnight
error_rotation = "10 MB"    # Rotate error log when it reaches 10 MB
server_retention = "7 days" # Keep server logs for 7 days
error_retention = "30 days" # Keep error logs for 30 days

# Chat Log Reporter Settings
[chat_log_reporter]
# 是否启用聊天日志上报功能
enable = true
# 日志上报服务url
report_url = "http://10.85.3.168:8099/api/code_plan_to_worker/log/bulk_add"
# 每次上报任务的间隔时间（秒）
report_interval_seconds = 60
# 每次从Redis获取的最大日志条数
batch_size = 1000
# 重试每次上报任务的间隔时间（秒）
retry_report_interval_seconds = 120
# 重试每次从Redis获取的最大日志条数
retry_batch_size = 1000

# Except Log Reporter Settings
[except_log_reporter]
# 是否启用异常日志上报功能
enable = true
# 异常日志上报服务url
report_url = "http://10.85.3.168:8099/api/except_request_log/bulk_add"
# 每次上报任务的间隔时间（秒）
report_interval_seconds = 180
# 每次从Redis获取的最大日志条数
batch_size = 1000

[sync_api_keys]
# api-key同步服务url
sync_url = "http://10.85.3.168:8099/api/code_plan_to_worker/api_key/valid_api_keys"
sync_url_v2 = "http://10.85.3.168:8099/api/code_plan_to_worker/api_key/valid_api_keys_v2"
sync_interval_seconds = 60

[sync_ai_model]
# ai_mode同步服务url
sync_url = "http://10.85.3.168:8099/api/code_plan_to_worker/ai_model/get_all_ai_model"
sync_interval_seconds = 3600
support_api_types = "openai" # 支持同步的api_type，多个逗号分隔

[scheduler]
# scheduler在线信号在Redis中的key
signal_key = "xaio-code-worker:scheduler:online"
# scheduler在线信号TTL（秒）
signal_ttl_seconds = 30
# scheduler在线信号刷新间隔（秒）
signal_refresh_interval_seconds = 10
# 兼容模式下主进程等待scheduler就绪的超时时间（秒）
wait_timeout_seconds = 60
# 兼容模式下轮询scheduler在线信号的间隔（秒）
wait_poll_interval_seconds = 1

[worker] #worker的内容对称加密密钥
encrypt_key = "RRVZgRa8kqMaAhtg_TvDK-bEqz6kN8ddNeLdsSXmtRw="

[service_check]
# 服务健康检查密钥
magic_secret = "sk-7d027cf7a05f9da7dc25aaf8bcf0d74ed3aeb245509d13291b13d044b5f022eb"

[vlm_proxy]
retries = 3               # Number of retries for failed requests
retry_interval = 1    # Interval between retries in seconds
total_request_timeout = 3600  # Total timeout for requests in seconds
anthropic_beta_header_blacklist = ""
