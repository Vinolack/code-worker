version: '3.9'
services:
  app:
    image: registry.gitlab.yeaosound.com/xaio-ai/xaio-code-worker:main
    container_name: xaio-code-worker-single
    restart: unless-stopped
    command: ["python", "main.py"]
    ports:
      - "8084:8084"
    volumes:
      - ./logs/single:/app/logs
      - ./config.toml:/app/config.toml:ro
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: xaio-code-worker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis-data:
